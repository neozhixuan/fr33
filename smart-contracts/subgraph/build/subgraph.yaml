specVersion: 1.3.0
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: JobEscrow
    network: polygon-amoy
    source:
      address: "0xDC0F09d74570eb51F27f8EbD3bB93aF8A81a6252"
      abi: JobEscrow
      startBlock: 35520530
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Job
        - EscrowEvent
      abis:
        - name: JobEscrow
          file: JobEscrow\JobEscrow.json
      eventHandlers:
        - event: JobCreated(indexed uint256,indexed address,uint256)
          handler: handleJobCreated
        - event: JobAccepted(indexed uint256,indexed address)
          handler: handleJobAccepted
        - event: ReleaseRequested(indexed uint256)
          handler: handleReleaseRequested
        - event: FundsReleased(indexed uint256,indexed address,uint256)
          handler: handleFundsReleased
        - event: JobCancelled(indexed uint256)
          handler: handleJobCancelled
      file: JobEscrow\JobEscrow.wasm
